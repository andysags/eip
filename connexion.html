<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - EventBenin</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&family=Outfit:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css?v=2.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Microsoft Clarity -->
    <script type="text/javascript">
        (function (c, l, a, r, i, t, y) {
            c[a] = c[a] || function () { (c[a].q = c[a].q || []).push(arguments) };
            t = l.createElement(r); t.async = 1; t.src = "https://www.clarity.ms/tag/" + i;
            y = l.getElementsByTagName(r)[0]; y.parentNode.insertBefore(t, y);
        })(window, document, "clarity", "script", "vpf22vkhh5");
    </script>
</head>

<body class="auth-v2-body">

    <div class="auth-v2-container">
        <!-- Brand / Return Link -->
        <a href="index.html" class="auth-v2-logo">
            <i class="fas fa-layer-group"></i> EventBenin.
        </a>

        <!-- Glass Card -->
        <div class="glass-card">

            <!-- Auth Tabs -->
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchTab('client')">
                    <i class="fas fa-user"></i> Espace Client
                </button>
                <button class="auth-tab" onclick="switchTab('vendor')">
                    <i class="fas fa-store"></i> Espace Loueur
                </button>
            </div>

            <div class="auth-content">
                <div class="text-center mb-4">
                    <h2 class="auth-title" id="auth-title">Bon retour 👋</h2>
                    <p class="auth-subtitle" id="auth-subtitle">Connectez-vous pour gérer vos locations.</p>
                </div>

                <form id="login-form">
                    <div class="auth-input-group">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" class="auth-input" id="email" placeholder="Adresse Email" required>
                    </div>

                    <div class="auth-input-group">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" class="auth-input" id="password" placeholder="Mot de passe" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword()"></i>
                    </div>

                    <div class="auth-options">
                        <label class="remember-me">
                            <input type="checkbox"> Se souvenir de moi
                        </label>
                        <a href="#" class="forgot-password">Mot de passe oublié ?</a>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block btn-lg glow-on-hover">
                        Se Connecter
                    </button>
                </form>

                <div class="auth-separator">
                    <span>Ou continuer avec</span>
                </div>

                <div class="social-login">
                    <button class="social-btn google"><i class="fab fa-google"></i></button>
                    <button class="social-btn facebook"><i class="fab fa-facebook-f"></i></button>
                </div>

                <!-- Demo shortcuts (Hidden but usable for dev/testing) -->
                <div style="margin-top: 1.5rem; display: flex; gap: 0.5rem; justify-content: center; opacity: 0.7;">
                    <button class="btn btn-outline btn-xs" onclick="quickLogin('client')">Demo Client</button>
                    <button class="btn btn-outline btn-xs" onclick="quickLogin('vendor')">Demo Loueur</button>
                </div>

                <div class="auth-footer">
                    Pas encore de compte ? <a href="inscription.html" id="signup-link">S'inscrire gratuitement</a>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/utils.js?v=2.0"></script>
    <script src="assets/js/store.js?v=2.0"></script>
    <script src="assets/js/app.js?v=2.0"></script> <!-- Ensure app.js is loaded for App.showToast -->
    <script>
        // Ensure App is initialized if not already
        if (typeof App !== 'undefined' && typeof App.init === 'function') {
            document.addEventListener('DOMContentLoaded', App.init);
        } else {
            console.warn("App.js might not be fully initialized. Ensure it's loaded before this script.");
        }
        Store.init();

        // Initial State
        let currentRole = 'client';

        function switchTab(role) {
            currentRole = role;
            document.querySelectorAll('.auth-tab').forEach(tab => tab.classList.remove('active'));

            if (role === 'client') {
                document.querySelector('.auth-tab:first-child').classList.add('active');
                document.getElementById('auth-title').textContent = "Espace Client";
                document.getElementById('auth-subtitle').textContent = "Trouvez et louez du matériel en toute simplicité.";
                document.getElementById('signup-link').href = "inscription.html?role=client";
            } else {
                document.querySelector('.auth-tab:last-child').classList.add('active');
                document.getElementById('auth-title').textContent = "Espace Loueur";
                document.getElementById('auth-subtitle').textContent = "Gérez vos stocks et boostez vos revenus.";
                document.getElementById('signup-link').href = "inscription.html?role=vendor";
            }
        }

        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.querySelector('.toggle-password');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        async function handleLogin(email, password) {
            try {
                const response = await fetch(Utils.API_BASE_URL + '/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password }),
                });

                const data = await response.json();

                if (response.ok) {
                    console.log('Login success, user data:', data.user);

                    // S'assurer que les données sont stockées AVANT la redirection
                    localStorage.setItem('eventbenin_user', JSON.stringify(data.user));
                    localStorage.setItem('eventbenin_session', JSON.stringify(data.session));

                    const metadata = data.user.user_metadata || {};
                    const userRole = metadata.user_type || 'client';

                    App.showToast('Connexion réussie !', 'success');

                    setTimeout(() => {
                        if (userRole === 'admin') {
                            window.location.replace('dashboard-admin.html');
                        } else if (userRole === 'loueur') {
                            window.location.replace('dashboard-loueur.html');
                        } else {
                            window.location.replace('dashboard-client.html');
                        }
                    }, 500);

                } else {
                    App.showToast(data.error || 'Identifiants incorrects.', 'error');
                    const card = document.querySelector('.glass-card');
                    card.classList.add('shake');
                    setTimeout(() => card.classList.remove('shake'), 500);
                }
            } catch (error) {
                console.error('Erreur réseau ou serveur:', error);
                App.showToast('Erreur de connexion au serveur.', 'error');
            }
        }

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            handleLogin(email, password);
        });

        window.quickLogin = (role) => {
            switchTab(role);
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            handleLogin(email, password);
        }

        // Init
        // Check URL param?
        // switchTab('client'); // Default
    </script>
</body>

</html>
