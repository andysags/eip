    <script>
        document.addEventListener('appReady', () => {
            const user = Store.getUser();
            const metadata = user?.user_metadata || {};
            // Allow vendor check logic
            if (!user || (metadata.user_type !== 'loueur' && metadata.user_type !== 'admin')) {
                console.warn("Accès dashboard loueur interdit.");
                window.location.href = 'connexion.html';
                return;
            }

            // Fill settings from metadata
            const companyNameInput = document.getElementById('setting-company-name');
            const contactEmailInput = document.getElementById('setting-contact-email');
            if (companyNameInput) companyNameInput.value = metadata.name || '';
            if (contactEmailInput) contactEmailInput.value = user.email || '';

            // Bind Navigation
            document.querySelectorAll('.dash-nav-item').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const target = e.currentTarget.getAttribute('href').substring(1);
                    if (target && target !== 'logout') {
                        renderLoueurView(target);
                        document.querySelectorAll('.dash-nav-item').forEach(l => l.classList.remove('active'));
                        e.currentTarget.classList.add('active');
                    }
                });
            });

            // Mobile Toggle
            window.toggleSidebar = () => {
                document.getElementById('sidebar').classList.toggle('show');
            };

            renderLoueurView('overview');
            updatePendingCount();
        });

        async function updatePendingCount() {
            const allOrders = await Store.getVendorOrders();
            const pending = allOrders.filter(o => o.status === 'En attente').length;
            const pendingBadge = document.getElementById('pending-count');
            if (pending > 0) {
                pendingBadge.textContent = pending;
                pendingBadge.style.display = 'inline-block';
            } else {
                pendingBadge.style.display = 'none';
            }
        }

        function renderLoueurView(viewName) {
            const mainContent = document.getElementById('main-content');
            const template = document.getElementById(`view-${viewName}`);

            if (!template) return;

            mainContent.innerHTML = '';
            mainContent.appendChild(template.content.cloneNode(true));

            if (viewName === 'overview') {
                renderOverview();
            } else if (viewName === 'products') {
                renderProductsStock();
            } else if (viewName === 'calendar') {
                renderCalendar();
            } else if (viewName === 'stats') {
                renderStats();
            }
        }

        // --- Form Handlers ---

        window.handleAddProduct = async (e) => {
            e.preventDefault();
            const form = e.target;
            const btn = form.querySelector('#btn-add-prod');
            const originalBtnText = btn.innerHTML;

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Envoi...';
            btn.disabled = true;

            try {
                const formData = new FormData(form);
                const fileInput = form.querySelector('input[type="file"]');
                let imageUrl = '';

                // 1. Upload Image
                if (fileInput.files.length > 0) {
                    const uploadData = new FormData();
                    uploadData.append('file', fileInput.files[0]);

                    const session = Store.getSession();
                    const token = session ? session.access_token : null;

                    const uploadRes = await fetch(Utils.API_BASE_URL + '/api/upload', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`
                        },
                        body: uploadData
                    });

                    if (!uploadRes.ok) {
                        if (uploadRes.status === 401) {
                            alert("Votre session a expiré. Veuillez vous reconnecter.");
                            Store.logout();
                            return;
                        }
                        const errData = await uploadRes.json().catch(() => ({ error: uploadRes.statusText }));
                        throw new Error(`Erreur upload: ${errData.error || uploadRes.statusText}`);
                    }
                    const uploadJson = await uploadRes.json();
                    imageUrl = uploadJson.url;
                }

                // 2. Create Product
                const product = {
                    name: formData.get('name'),
                    category: formData.get('category'),
                    price: parseInt(formData.get('price')),
                    stock: parseInt(formData.get('stock')),
                    image: imageUrl,
                    description: formData.get('description'),
                    isPopular: false,
                    reviews: [],
                    vendorId: Store.getUser()?.id
                };

                const newProduct = await Store.addProduct(product);

                if (newProduct) {
                    Utils.showToast('Produit ajouté avec succès !');
                    renderLoueurView('products');
                } else {
                    Utils.showToast("Erreur lors de la création du produit", "error");
                }

            } catch (err) {
                console.error(err);
                Utils.showToast(err.message || "Une erreur est survenue", "error");
            } finally {
                btn.innerHTML = originalBtnText;
                btn.disabled = false;
            }
        };

        window.handleSettingsUpdate = (e) => {
            e.preventDefault();
            // Mock update
            Utils.showToast('Paramètres mis à jour !');
        };

        // --- Renderers ---

        async function renderStats() {
            const allOrders = await Store.getVendorOrders();
            // Calculate total revenue from ITEMS belonging to vendor (which we returned in the API)
            // But API returned Orders structure. 
            // In Store.getVendorOrders we just default return fetch json.
            // Let's assume order.items has the items relevant to vendor and their 'total' property calculated in backend/routes/orders.js

            let totalRevenue = 0;
            let totalItemsSold = 0;

            allOrders.forEach(order => {
                if (order.items) {
                    order.items.forEach(item => {
                        totalRevenue += (item.price * item.quantity); // or item.total
                        totalItemsSold += item.quantity;
                    });
                }
            });

            const totalOrders = allOrders.length;
            const avgOrder = totalOrders > 0 ? Math.round(totalRevenue / totalOrders) : 0;

            document.getElementById('stats-total-orders').textContent = totalOrders;
            document.getElementById('stats-avg-order').textContent = Utils.formatCurrency(avgOrder);
        }

        async function renderOverview() {
            // Show loading state?
            const tbody = document.getElementById('orders-table');
            if (tbody) tbody.innerHTML = '<tr><td colspan="6" class="text-center"><i class="fas fa-spinner fa-spin"></i> Chargement...</td></tr>';

            const allOrders = await Store.getVendorOrders();
            await Store.fetchProducts(); // Ensure fresh data
            const products = Store.getAllProducts();
            const user = Store.getUser();
            const myProducts = products.filter(p => p.vendor_id === user.id);

            // Calcs
            let totalRevenue = 0;
            allOrders.forEach(order => {
                if (order.items) {
                    order.items.forEach(item => {
                        totalRevenue += (item.price * item.quantity);
                    });
                }
            });

            const totalRes = allOrders.length;

            if (document.getElementById('stats-revenue')) document.getElementById('stats-revenue').textContent = Utils.formatCurrency(totalRevenue);
            if (document.getElementById('stats-res-count')) document.getElementById('stats-res-count').textContent = totalRes;
            if (document.getElementById('stats-products')) document.getElementById('stats-products').textContent = myProducts.length;

            // Table
            // Re-grab tbody in case view changed, though we are in renderOverview
            const tableBody = document.getElementById('orders-table');
            if (!tableBody) return;

            if (allOrders.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="6" class="text-center">Aucune commande pour le moment.</td></tr>';
                return;
            }

            tableBody.innerHTML = allOrders.map(order => {
                const statusColor =
                    order.status === 'En attente' ? 'background: #FEF3C7; color: #92400E;' :
                        order.status === 'Confirmé' ? 'background: #DEF7EC; color: #03543F;' :
                            'background: #F3F4F6; color: #1F2937;';

                const actionBtn = order.status === 'En attente'
                    ? `<button class="btn btn-sm btn-primary" onclick="updateOrderStatus('${order.id}', 'Confirmé')">Valider</button>`
                    : `<span style="color: var(--text-gray); font-size: 0.8rem;">Aucune action</span>`;

                // Calculate total for this vendor in this order
                let orderTotal = 0;
                if (order.items) {
                    orderTotal = order.items.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                }

                return `
                    <tr>
                        <td><span style="font-family: monospace;">${order.id.substring(0, 8)}...</span></td>
                        <td>
                            <div style="font-weight: 600;">${order.user ? order.user.full_name : 'Client'}</div>
                            <div style="font-size: 0.8rem; color: var(--text-gray);">${order.event_date ? Utils.formatDate(order.event_date) : 'N/A'}</div>
                        </td>
                        <td>${Utils.formatDate(order.created_at)}</td>
                        <td style="font-weight: 700;">${Utils.formatCurrency(orderTotal)}</td>
                        <td><span style="${statusColor} padding: 4px 12px; border-radius: 12px; font-size: 0.8rem; font-weight: 600;">${order.status}</span></td>
                        <td>${actionBtn}</td>
                    </tr>
                `;
            }).join('');
        }

        async function renderProductsStock() {
            // This still uses Store.getAllProducts which fetches from API (assuming we updated it previously or it was already API based? 
            // Wait, Store.getAllProducts in previous turn was: 
            // return JSON.parse(localStorage.getItem(Store.KEYS.PRODUCTS));
            // Ah! We updated Store.fetchProducts but Store.getAllProducts might still be local?
            // Let's check Store.js content...
            // "fetchProducts: async () => { ... const products = await response.json(); localStorage.setItem(..., JSON.stringify(products)); return products; }"
            // "getAllProducts: () => { return JSON.parse(localStorage.getItem(Store.KEYS.PRODUCTS)); }"
            // So getAllProducts gets from local cache, which is populated by fetchProducts.
            // We should ensure fetchProducts is called at init or here.

            // For now, let's assume App.init calls fetchProducts or we call it here.
            await Store.fetchProducts(); // Refresh cache
            const products = Store.getAllProducts(); // Read cache

            // Filter by vendor?
            const user = Store.getUser();
            const vendorProducts = products.filter(p => p.vendor_id === user.id);

            const tbody = document.getElementById('products-table');
            // const today = new Date().toISOString().split('T')[0];

            tbody.innerHTML = vendorProducts.map(p => {
                if (!p.id) return ''; // Skip invalid/cached products without ID
                // Mock availablity for now as we don't have complex calendar logic in backend yet
                const available = p.stock;

                return `
                    <tr>
                         <td>
                            <div style="display: flex; align-items: center; gap: 1rem;">
                                <img src="${p.image}" alt="" style="width: 40px; height: 40px; border-radius: 4px; object-fit: cover;">
                                <span style="font-weight: 600;">${p.name}</span>
                            </div>
                        </td>
                        <td><span>${p.category}</span></td>
                        <td>${Utils.formatCurrency(p.price)}</td>
                        <td><span style="font-weight: 700;">${p.stock}</span></td>
                        <td>
                            <span style="color: ${available > 0 ? 'var(--primary-color)' : 'var(--accent-color)'}; font-weight: 700;">
                                ${available}
                            </span>
                        </td>
                        <td>
                            <button class="btn btn-sm btn-outline" style="color: red; border-color: red;" onclick="handleDeleteProduct('${p.id}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        window.handleDeleteProduct = async (id) => {
            const success = await Store.deleteProduct(id);
            if (success) {
                renderLoueurView('products');
            }
        };

        async function renderCalendar() {
            const tbody = document.getElementById('calendar-table');
            const allOrders = await Store.getVendorOrders();

            // Generate next 7 days
            let days = [];
            for (let i = 0; i < 7; i++) {
                const d = new Date();
                d.setDate(d.getDate() + i);
                days.push(d.toISOString().split('T')[0]); // YYYY-MM-DD
            }

            tbody.innerHTML = days.map(date => {
                // Check if any order has event_date === date
                const ordersForDay = allOrders.filter(o => {
                    // o.event_date might be full ISO or just date string. Backend schema: date.
                    return o.event_date === date;
                });

                const count = ordersForDay.length;
                const itemsCount = ordersForDay.reduce((acc, o) => {
                    return acc + (o.items ? o.items.reduce((s, i) => s + i.quantity, 0) : 0);
                }, 0);

                return `
                    <tr>
                        <td style="font-weight: 600;">${Utils.formatDate(date)}</td>
                        <td>${count > 0 ? `<span class="badge" style="position: static;">${count}</span>` : '<span style="color: var(--text-gray);">-</span>'}</td>
                        <td>${itemsCount > 0 ? itemsCount + ' articles' : '-'}</td>
                    </tr>
                 `;
            }).join('');
        }

        window.updateOrderStatus = async (id, newStatus) => {
            if (confirm(`Voulez-vous vraiment passer cette commande à "${newStatus}" ?`)) {
                const success = await Store.updateOrderStatus(id, newStatus);
                if (success) {
                    renderLoueurView('overview');
                    updatePendingCount();
                    Utils.showToast("Commande validée avec succès !");
                } else {
                    Utils.showToast("Erreur lors de la mise à jour.", "error");
                }
            }
        };
    </script>
</body>

</html>
